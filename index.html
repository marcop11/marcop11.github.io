<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- Include the CesiumJS JavaScript and CSS files -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.108/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.108/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
</head>
<body>
  <div id="cesiumContainer"></div>
  <script type="module">
    // Your access token can be found at: https://ion.cesium.com/tokens.
    // This is the default access token from your ion account

    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI5MTZiYTU1MC1jZmQ2LTRkZTEtOTgyOC0yMjBlZTAyZGZlMDgiLCJpZCI6MTU3NzMzLCJpYXQiOjE2OTA4ODYxOTR9.xLVVhFb_7-r8A6s2sMHkrKpBkjzWdnPZjK7fOr_l4co';

    // Initialize the Cesium Viewer in the HTML element with the `cesiumContainer` ID.
    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrain: Cesium.Terrain.fromWorldTerrain(),
      timeline: false, // Add timeline
      animation: false, // Add animation control for timeline
    });    

    // Fly the camera to San Francisco at the given longitude, latitude, and height.
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(-122.4175, 37.655, 400),
      orientation: {
        heading: Cesium.Math.toRadians(0.0),
        pitch: Cesium.Math.toRadians(-15.0),
      }
    });

    // Add Cesium OSM Buildings, a global 3D buildings layer.
    const buildingTileset = await Cesium.createOsmBuildingsAsync();
    viewer.scene.primitives.add(buildingTileset);   

    // Melide Gift
    var imageUrl = 'Gift.jpeg'; // Replace 'path_to_your_image.jpg' with the actual path to your image
    var imageOverlay = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(8.9443108,45.9528598, 500), // Position to place the image
        billboard: {
            image: imageUrl,
            scale: 1.0, // Scale of the image
            sizeInMeters: true // Set to true if the size of the image is in meters
        }
    });
    imageOverlay.description = '<a href="https://t.ly/AlexandraBDay">Click here for more info</a>';

        // Where did marco grow up?
        var imageUrl1 = 'Hint.png'; // Replace 'path_to_your_image.jpg' with the actual path to your image

        billboard: {

    // Where did we meet?

        // Where do we live?

    var imageOverlay3 = viewer.entities.add({
